<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rafa Empire | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <div class="brand">
        <img src="images/logo.jpeg" alt="Rafa Empire Logo" class="logo">
        <p class="brand-text">Rafa Empire</p>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container page-wrap">
      <section class="panel">
        <span class="eyebrow">Contact Rafa Empire</span>
        <h1>Tell us what you need and we will reach out quickly.</h1>
      </section>

      <section class="panel contact-layout">
        <form
          class="form"
          id="contact-form"
          action="https://formsubmit.co/ajax/helderrafan4@gmail.com"
          method="POST"
          onsubmit="submitForm(event)"
        >
          <input type="hidden" name="_subject" value="New Website Contact Message - Rafa Empire">
          <input type="hidden" name="_captcha" value="false">
          <input type="text" name="_honey" class="sr-only" tabindex="-1" autocomplete="off">
          <div>
            <label for="name">Your Name</label>
            <input id="name" type="text" name="name" placeholder="Your Name" required>
          </div>
          <div>
            <label for="email">Your Email</label>
            <input id="email" type="email" name="email" placeholder="you@example.com" required>
          </div>
          <div>
            <label for="message">Your Message</label>
            <textarea id="message" name="message" placeholder="Write your message..." required></textarea>
          </div>
          <button type="submit" class="btn">Send Message</button>
          <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
        </form>

        <aside class="contact-info">
          <h3>Direct Contact</h3>
          <p><strong>Phone:</strong> +27 68 364 3805</p>
          <p><strong>Email:</strong> helderrafan4@gmail.com</p>
          <p><strong>Location:</strong> Gauteng, Alberton, South Africa</p>
        </aside>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Rafa Empire. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/scripts.js"></script>
</body>
</html>
